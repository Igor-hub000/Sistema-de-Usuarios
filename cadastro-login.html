<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Sistema</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e2937 0%, #334155 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    h1 { margin-bottom: 10px; }
    p { color: #94a3b8; margin-bottom: 30px; }
    input {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 17px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 20px 0 10px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #10b981;
      color: white;
    }
    #mensagem {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      border: 1px solid #4b5563;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Criar Conta</h1>
    <p>Crie sua conta no Sistema</p>
    <input type="text" id="novoUsuario" placeholder="Nome de usuário">
    <input type="password" id="novaSenha" placeholder="Senha">
    <input type="password" id="confirmarSenha" placeholder="Confirmar Senha">
    <button onclick="cadastrarUsuario()">Cadastrar</button>
    <a href="login.html" style="color:#60a5fa; text-decoration:none;">Já tenho conta? Fazer Login</a>
  </div>
  <div id="mensagem"></div>
  <script>
    function mostrarMensagem(texto, tipo = "sucesso") {
      const msg = document.getElementById("mensagem");
      msg.innerHTML = tipo === "sucesso" ? `✅ ${texto}` : `❌ ${texto}`;
      msg.style.display = "flex";
      setTimeout(() => { msg.style.display = "none"; }, 3000);
    }
    function cadastrarUsuario() {
      const usuario = document.getElementById("novoUsuario").value.trim();
      const senha = document.getElementById("novaSenha").value.trim();
      const confirmar = document.getElementById("confirmarSenha").value.trim();
      if (!usuario || !senha || !confirmar) {
        mostrarMensagem("Preencha todos os campos!", "erro");
        return;
      }
      if (senha !== confirmar) {
        mostrarMensagem("As senhas não coincidem!", "erro");
        return;
      }
      localStorage.setItem("usuarioCadastrado", usuario);
      localStorage.setItem("senhaCadastrada", senha);
      mostrarMensagem(`Usuário "${usuario}" cadastrado com sucesso!`);
      setTimeout(() => { window.location.href = "index.html"; }, 2500);
    }
  </script>
</body>
</html>
