<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Sistema</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e2937 0%, #334155 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 50px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    h1 { font-size: 32px; margin-bottom: 10px; }
    p { color: #94a3b8; margin-bottom: 30px; }
    .input-group { position: relative; margin: 12px 0; }
    input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 17px;
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 25px 0 10px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #10b981;
      color: white;
    }
    button:hover { background: #059669; }
    .link { color: #60a5fa; text-decoration: none; margin-top: 15px; display: inline-block; }
    #mensagem {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      border: 1px solid #4b5563;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Login</h1>
    <p>Acesse o Sistema PT6</p>
    <input type="text" id="usuario" placeholder="Usuário">
    <div class="input-group">
      <input type="password" id="senha" placeholder="Senha">
      <span class="toggle-password" id="eye">👁️</span>
    </div>
    <button onclick="fazerLogin()">Entrar</button>
    <a href="cadastro-login.html" class="link">Não tem conta? Criar agora</a>
  </div>
  <div id="mensagem"></div>
  <script>
    function mostrarMensagem(texto, tipo = "sucesso") {
      const msg = document.getElementById("mensagem");
      msg.innerHTML = tipo === "sucesso" ? `✅ ${texto}` : `❌ ${texto}`;
      msg.style.display = "flex";
      setTimeout(() => { msg.style.display = "none"; }, 3000);
    }
    const eye = document.getElementById("eye");
    const senhaInput = document.getElementById("senha");
    eye.addEventListener("click", () => {
      if (senhaInput.type === "password") {
        senhaInput.type = "text";
        eye.textContent = "🙈";
      } else {
        senhaInput.type = "password";
        eye.textContent = "👁️";
      }
    });
    function fazerLogin() {
      const usuarioDigitado = document.getElementById("usuario").value.trim();
      const senhaDigitada = document.getElementById("senha").value.trim();
      const usuarioCadastrado = localStorage.getItem("usuarioCadastrado");
      const senhaCadastrada = localStorage.getItem("senhaCadastrada");
      if (usuarioDigitado === usuarioCadastrado && senhaDigitada === senhaCadastrada) {
        localStorage.setItem("logado", "true");
        window.location.href = "home.html";
      } else {
        mostrarMensagem("Usuário ou senha incorretos!", "erro");
      }
    }
  </script>
</body>
</html>
